services:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cricket-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      # Atlas connection string comes from .env — never hardcoded here
      - MONGODB_URI=${MONGODB_URI}
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET}
      # On the server set this to: http://YOUR_SERVER_IP:3000
      # Leave empty for local (localhost:3000 is already allowed in code)
      - EXTRA_ALLOWED_ORIGINS=${EXTRA_ALLOWED_ORIGINS:-}

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # For local: browser hits localhost:4000
        # For server: change to http://YOUR_SERVER_IP:4000/api/v1
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000/api/v1}
    container_name: cricket-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
